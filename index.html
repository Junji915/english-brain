<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Global Quest: English Communicator</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f4f6f8;
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .status-bar {
      background-color: #2c3e50;
      color: #fff;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      z-index: 10;
    }
    .level-info {
      font-size: 18px;
      font-weight: bold;
      color: #f1c40f;
    }
    .exp-container {
      width: 50%;
      background: #34495e;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      height: 20px;
    }
    .exp-bar {
      height: 100%;
      background-color: #2ecc71;
      width: 0%;
      transition: width 0.5s ease;
    }
    .exp-text {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 12px;
      line-height: 20px;
      font-weight: bold;
    }
    .chat-container {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background-color: #e5ddd5;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.4;
      position: relative;
    }
    .message.npc {
      background-color: #fff;
      align-self: flex-start;
      border-bottom-left-radius: 0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .message.player {
      background-color: #dcf8c6;
      align-self: flex-end;
      border-bottom-right-radius: 0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .npc-name {
      font-size: 12px;
      color: #7f8c8d;
      margin-bottom: 4px;
      font-weight: bold;
    }
    .feedback-box {
      margin-top: 10px;
      padding: 10px;
      background-color: #fdf2e9;
      border-left: 4px solid #e67e22;
      font-size: 13px;
      color: #d35400;
      border-radius: 4px;
    }
    .system-msg {
      align-self: center;
      background-color: rgba(0,0,0,0.5);
      color: white;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 12px;
    }
    .input-area {
      background-color: #f0f0f0;
      padding: 10px 15px;
      display: flex;
      gap: 8px;
      padding-bottom: env(safe-area-inset-bottom, 15px);
      align-items: center;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 24px;
      font-size: 16px;
      outline: none;
    }
    .mic-btn, .send-btn {
      color: white;
      border: none;
      width: 44px;
      height: 44px;
